# Research Intent Templates
# Last updated: 2026-04-10
# This file defines the base hypotheses and mappings for signal-to-intent generation.

templates:
  macro_liquidity:
    hypothesis_type: ["trend", "mean_reversion"]
    bias_direction: ["bullish", "bearish", "regime-risk"]
    affected_universe: ["BTC", "ETH", "QQQ"]
    time_horizon: "days_to_weeks"
    validation_goal: "¿Repricing macro diverge de crypto?"
    invalidation_signal: "Crypto decouples; macro no impacta"
    route: "research_hypothesis"
    
  btc_on_chain_whale:
    hypothesis_type: ["event_driven"]
    bias_direction: ["bullish", "bearish"]
    affected_universe: ["BTC"]
    time_horizon: "hours_to_days"
    validation_goal: "¿Whale activity predice volatilidad?"
    invalidation_signal: "No hay movimientos de precio después de 6h"
    route: "research_hypothesis"
    
  eth_regulatory_risk:
    hypothesis_type: ["regime-risk"]
    bias_direction: ["bearish", "regime-risk"]
    affected_universe: ["ETH"]
    time_horizon: "weeks"
    validation_goal: "¿Regulación afecta liquidez en venues?"
    risk_filter_hint: "venue gating + margin adjustment"
    invalidation_signal: "Regulador se atrasa o dilata"
    route: "risk_filter"

  web3_market_structure:
    hypothesis_type: ["trend"]
    bias_direction: ["bullish", "bearish"]
    affected_universe: ["ALT_L1", "DEFI"]
    time_horizon: "days_to_weeks"
    validation_goal: "¿Cambio en estructura de mercado favorece rotación?"
    invalidation_signal: "Volumen se mantiene en BTC/ETH únicamente"
    route: "research_hypothesis"

  execution_venue_risk:
    hypothesis_type: ["risk_filter"]
    bias_direction: ["bearish"]
    affected_universe: ["EXCHANGES", "CUSTODIANS"]
    time_horizon: "immediate"
    validation_goal: "¿Riesgo de contrapartida requiere reducción de exposición?"
    invalidation_signal: "Venue normaliza operaciones o comunicación"
    route: "risk_filter"
